services:

  backend:
    build: .
    container_name: legal-rag-backend
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./documents:/app/documents
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434/v1
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
